[metadata]
name = django-base
version = 0.1.1
author = Jamal Blaquera
author_email = ugamedev08@gmail.com
description = Base Django project with allauth, custom settings, templates, and static files
long_description = file: README.md
long_description_content_type = text/markdown
license = MIT
url = https://github.com/ugamedev3D/BaseProject-Template-Django-Allauth

[options]
packages = find:
include_package_data = True
install_requires =
    django
    django-allauth
    django-allauth[socialaccount]
    django-environ
    django-htmx
    django-livereload
    django-compressor
    pillow
    whitenoise
    requests

[options.package_data]
* = template/*, template/templates/*, template/static/*

[options.entry_points]
console_scripts =
    django-base = baseproject.cli:create_project