{% load static compress django_htmx %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    {% compress js %}
        <script src="{% static 'js/main.js' %}" defer></script>
    {% endcompress %}
    {% compress css %}
        <link rel="stylesheet" type="text/css"  href="{% static 'css/style.css' %}">
    {% endcompress %}
    {% htmx_script %}
</head>
<body hx-headers='{"x-csrftoken": "{{ csrf_token }}"}'>
    <header>
        <nav>
            <ul>
                <li><a href="{% url 'pages:home' %}"></a>Home</li>
                {% if user.is_authenticated %}
                
                {% else %}
                <li><a href="{% url 'user:account_login' %}">Login</a></li>
                <li><a href="{% url 'user:account_signup' %}">Signup</a></li>
                {% endif %}
                
                <li></li>
                <li></li>
            </ul>
        </nav>
    </header>
</body>
</html>
